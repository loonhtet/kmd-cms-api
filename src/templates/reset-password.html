<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Password Reset Email</title>
<style>
    body{
        background:#f2f2f2;
        font-family: Arial, Helvetica, sans-serif;
        padding:40px;
    }

    .container{
        max-width:600px;
        margin:auto;
        background:#ffffff;
        border-radius:10px;
        box-shadow:0 4px 10px rgba(0,0,0,0.15);
        overflow:hidden;
    }

    .header{
        background:#2b86c5;
        color:white;
        padding:18px 25px;
        font-size:20px;
        font-weight:bold;
    }

    .content{
        padding:30px;
        color:#333;
        line-height:1.6;
    }

    .password-box{
        background:#f5f7fa;
        border:1px dashed #2b86c5;
        padding:15px;
        margin:20px 0;
        text-align:center;
        font-size:20px;
        font-weight:bold;
        color:#2b86c5;
        border-radius:6px;
    }

    .footer{
        font-size:13px;
        color:#777;
        margin-top:20px;
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">
        Password Reset Email
    </div>

    <div class="content">

        <h3>Dear {{studentName}},</h3>

        <p>Your password has been successfully reset. Please use the new password below to log in to your account.</p>

        <div class="password-box">
            New Password: <br>
            <strong>{{password}}</strong>
        </div>

        <p class="footer">
        Alternatively, you can reset your password anytime using the "Forgot Password?" option on the login page.
        </p>

    </div>

</div>

</body>
</html>
