<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 40px 20px; background-color: #f4f7f9; font-family: 'Segoe UI', Arial, sans-serif;">

    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 500px; background-color: #ffffff; border: 1px solid #2196F3; border-radius: 8px; overflow: hidden; text-align: center;">
        <tr>
            <td style="padding: 40px 30px;">
                
                <div style="margin-bottom: 20px;">
                    <div style="display: inline-block; width: 80px; height: 110px; border: 2px solid #2196F3; border-radius: 10px; position: relative;">
                        <div style="margin-top: 20px; font-size: 12px; color: #2196F3;">****</div>
                        <div style="margin-top: 10px; font-size: 20px;">✅</div>
                        </div>
                </div>

                <h2 style="color: #2196F3; font-size: 20px; margin-bottom: 25px;">Your one-time code is</h2>

                <div style="display: inline-block; padding: 15px 40px; border: 1px solid #333333; font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #000000; margin-bottom: 30px;">
                    {{otp}}
                </div>

                <p style="font-size: 14px; color: #555555; line-height: 1.6; margin: 0 auto; max-width: 350px;">
                    Please verify you're really you by entering this 6-digit code when you log in. Just a heads up, this code will expire in 10 minutes for security reasons.
                </p>

            </td>
        </tr>
    </table>

</body>
</html>
